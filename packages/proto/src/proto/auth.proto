syntax = "proto3";

package auth;

message User {
  string fullname = 1;
  string email = 2;
  string avatarUri = 3;
  bool   emailVerified = 4;
  string createdAt = 5;
  string updatedAt = 6;
  string provider = 7;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message Tokens {
  string refreshToken = 1;
  string accessToken = 2;
}

message LoginResponse {
  Tokens tokens = 1;
}

message SigninRequest {
  string fullname = 1;
  string email = 2;
  string password = 3;
  string avatarUri = 4;
  bool   emailVerified = 5;
  string provider = 6;
}

message GetUserResponse {
  string fullname = 1;
  string email = 2;
  string avatarUri = 3;
  string createdAt = 4;
  string updatedAt = 5;
}

message GetMeRequest {
  string userId = 1;
}

message GetUserRequest {
  User authUserData = 1;
  string targetUserId = 2;
}

message RefreshTokenRequest {
  User   user = 1;
  string refreshToken = 2;
}

message CreateTeamRequest {
  User   authUserData = 1;
  string teamName = 2;
  string description = 3;
}

message Team {
  string teamId = 1;
  string teamName = 2;
  string description = 3;
  string planType = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message GetTeamRequest {
  User   authUserData = 1;
  string teamId = 2;
}

message DeleteTeamRequest {
  User   authUserData = 1;
  string teamId = 2;
}

message DeleteTeamResponse {
  string message = 1;
}

message CreateTeamMemberInvitationRequest {
  User   authUserData = 1;
  string targetUserId = 2;
  string teamId = 3;
  string role = 4;
}

message CreateTeamMemberInvitationResponse {
  string inviteId = 1;
  string role = 2;
  string teamId = 3;
  string status = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message GetTeamMemberResponse {
  string memberId = 1;
  string userId = 2;
  string teamId = 3;
  string role = 4;
}

message GetProjectMemberResponse {
  string memberId = 1;
  string userId = 2;
  string projectId = 3;
  string role = 4;
}

message GenericGetMemberRequest {
  User   authUserData = 1;
  string memberId = 2;
}

message GenericDeleteMemberRequest {
  User   authUserData = 1;
  string memberId = 2;
}

message GenericDeleteMemberResponse {
  string message = 1;
}

message ProjectMemberInvitationRequest {
  User   authUserData = 1;
  string targetUserId = 2;
  string projectId = 3;
  string role = 4;
}

message CreateProjectMemberInvitationResponse {
  string inviteId = 1;
  string role = 2;
  string projectId = 3;
  string status = 4;
  string createdAt = 5;
  string updatedAt = 6;
}

message DeleteProjectRequest {
  User   authUserData = 1;
  string projectId = 2;
}

message DeleteProjectResponse {
  string message = 1;
}

service AuthService {
  // Authentication
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Signin(SigninRequest) returns (LoginResponse);
  rpc OAuth(SigninRequest) returns (LoginResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetMe(GetMeRequest) returns (User);
  rpc RefreshToken(RefreshTokenRequest) returns (Tokens);

  // Team Management
  rpc CreateTeam(CreateTeamRequest) returns (Team);
  rpc GetTeam(GetTeamRequest) returns (Team);
  rpc DeleteTeam(DeleteTeamRequest) returns (DeleteTeamResponse);

  // Team Members
  rpc CreateTeamMemberInvitation(CreateTeamMemberInvitationRequest) returns (CreateTeamMemberInvitationResponse);
  rpc GetTeamMember(GenericGetMemberRequest) returns (GetTeamMemberResponse);
  rpc DeleteTeamMember(GenericDeleteMemberRequest) returns (GenericDeleteMemberResponse);

  // Project Members
  rpc CreateProjectMemberInvitation(ProjectMemberInvitationRequest) returns (CreateProjectMemberInvitationResponse);
  rpc GetProjectMember(GenericGetMemberRequest) returns (GetProjectMemberResponse);
  rpc DeleteProjectMember(GenericDeleteMemberRequest) returns (GenericDeleteMemberResponse);

  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);

  // Future: partial decentralized RBAC
  // rpc UpdateTeamMember(UpdateTeamMemberRequest) returns (UpdateTeamMemberResponse);
  // rpc UpdateProjectMember(UpdateProjectMemberRequest) returns (UpdateProjectMemberResponse);
}
